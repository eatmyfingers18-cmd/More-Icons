name: Build

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Install Geode CLI
        shell: powershell
        run: |
          Invoke-WebRequest https://github.com/geode-sdk/cli/releases/latest/download/geode-windows-x64.exe -OutFile geode.exe

      - name: Install SDK
        shell: powershell
        run: |
          .\geode.exe sdk install

      - name: Build Mod
        shell: powershell
        run: |
          .\geode.exe build

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mod
          path: build/*.geode
