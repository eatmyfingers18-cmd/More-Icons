name: Build Geode Mod

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Geode CLI
        run: |
          curl -L https://github.com/geode-sdk/cli/releases/latest/download/geode-windows.exe -o geode.exe
          echo "%cd%" >> $GITHUB_PATH

      - name: Install Geode SDK
        run: |
          geode.exe sdk install

      - name: Build Mod
        run: |
          geode.exe build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: built-mod
          path: build/*.geode
