name: Build Geode Mod

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download Geode CLI
        run: |
          curl -L https://github.com/geode-sdk/cli/releases/latest/download/geode-windows.exe -o geode.exe

      - name: Install Geode SDK
        run: |
          .\geode.exe sdk install

      - name: Build Mod
        run: |
          .\geode.exe build

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: built-mod
          path: build/*.geode
