name: Build Geode Mod

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Geode
        uses: geode-sdk/build-geode-mod@v2

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: built-mod
          path: build/*.geode
